name: Main

on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'
    - 'v[0-9]+.[0-9]+.[0-9]+.rc[0-9]+'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    uses: powerof3/pack-skse-mod/.github/workflows/pack.yml@main-vs2022
    with:
      CMAKE_SE_CONFIG_PRESET: 'vs2022-se'
      CMAKE_SE_BUILD_PRESET: 'vs2022-se'
      CMAKE_AE_CONFIG_PRESET: 'vs2022-ae'
      CMAKE_AE_BUILD_PRESET: 'vs2022-ae'
      CMAKE_VR_CONFIG_PRESET: 'vs2022-vr'
      CMAKE_VR_BUILD_PRESET: 'vs2022-vr'
      FOMOD_INCLUDE_PDB: true
      FOMOD_MOD_NAME: "Keyword Item Distributor"
      FOMOD_MOD_AUTHOR: "powerofthree"
      FOMOD_MOD_NEXUS_ID: "55728"
      FOMOD_SE_MIN_GAME_VERSION: '1.5'
      FOMOD_AE_NAME: 'SSE v1.6+ ("Anniversary Edition")'
      FOMOD_AE_DESCR: 'Select this if you are using Skyrim Anniversary Edition v1.6 or higher.'
      FOMOD_AE_MIN_GAME_VERSION: '1.6'
      FOMOD_REQUIRED_INSTALLATION_DIR: "Skyrim/Data"
      PUBLISH_ARCHIVE_TYPE: '7z'
